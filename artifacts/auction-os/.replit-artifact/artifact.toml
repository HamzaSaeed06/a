kind = "web"
previewPath = "/"
title = "Auction OS"
version = "1.0.0"
id = "artifacts/auction-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24558

[services.development]
run = "pnpm --filter @workspace/auction-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/auction-os", "run", "build" ]
publicDir = "artifacts/auction-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24558"
BASE_PATH = "/"
